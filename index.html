<!DOCTYPE html>
<html>
<head>
  <title>Private Chat</title>
  <style>
    body { margin:0; font-family:Arial; background:#36393f; color:white; }
    #app { display:flex; height:100vh; }

    #chat { flex:1; display:flex; flex-direction:column; }
    #messages { flex:1; padding:15px; overflow:auto; background:#2f3136; }
    #input { display:flex; padding:10px; background:#40444b; }
    input { flex:1; padding:10px; border:none; border-radius:8px; }
    button { padding:10px; margin-left:5px; border:none; border-radius:5px; cursor:pointer; background:#7289da; color:white; }

    #users { width:220px; background:#2f3136; padding:10px; border-left:1px solid #202225; }
    .user { display:flex; align-items:center; margin-bottom:10px; }

    .avatar {
      width:30px; height:30px; border-radius:50%;
      margin-right:10px;
      display:flex; align-items:center; justify-content:center;
      font-weight:bold; color:white;
      transition: box-shadow 0.2s;
    }

    .speaking { box-shadow: 0 0 10px 3px #43b581; }

    .message {
      background:#40444b;
      padding:8px 12px;
      border-radius:8px;
      margin-bottom:8px;
      display:flex;
      align-items:center;
      max-width:70%;
    }

    .message b { color:#7289da; margin-right:5px; }
  </style>
</head>
<body>

<script>
const username = prompt("Enter your name:");
const room = prompt("Enter room code:");
</script>

<div id="app">
  <div id="chat">
    <div id="messages"></div>

    <div id="input">
      <input id="msg" placeholder="Message..." />
      <button onclick="sendMsg()">Send</button>
    </div>

    <div style="padding:10px; background:#40444b;">
      <button onclick="startVoice()">Join Voice</button>
      <button onclick="toggleMute()">Mute</button>
      <button onclick="toggleDeafen()">Deafen</button>
      <button onclick="leaveVoice()">Leave Voice</button>
    </div>
  </div>

  <div id="users">
    <h3>Users</h3>
    <div id="userList"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();

const messages = document.getElementById("messages");
const userList = document.getElementById("userList");

// color generator
function stringToColor(str){
  let hash = 0;
  for(let i=0;i<str.length;i++){ hash = str.charCodeAt(i) + ((hash<<5)-hash); }
  let color = '#';
  for(let i=0;i<3;i++){
    const value = (hash >> (i*8)) & 0xFF;
    color += ('00'+value.toString(16)).slice(-2);
  }
  return color;
}

// join room
socket.emit("join-room", { room, username });

// send message
function sendMsg(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;
  socket.emit("chat", msg);
  document.getElementById("msg").value = "";
}

// enter to send
document.getElementById("msg").addEventListener("keydown", e=>{
  if(e.key === "Enter") sendMsg();
});

// 🆕 LOAD MESSAGE HISTORY
socket.on("chat-history", history => {
  history.forEach(addMessage);
  messages.scrollTop = messages.scrollHeight;
});

// receive message
socket.on("chat", data => {
  addMessage(data);
});

// render message
function addMessage(data){
  const div = document.createElement("div");
  div.className = "message";

  const avatar = document.createElement("div");
  avatar.className = "avatar";
  avatar.style.backgroundColor = stringToColor(data.user);
  avatar.textContent = data.user[0].toUpperCase();

  const text = document.createElement("span");
  text.innerHTML = `<b>${data.user}</b>: ${data.text}`;

  div.appendChild(avatar);
  div.appendChild(text);
  messages.appendChild(div);
}

// user list
let userAvatars = {};
socket.on("users", users => {
  userList.innerHTML = "";
  userAvatars = {};

  users.forEach(u => {
    const div = document.createElement("div");
    div.className = "user";

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.style.backgroundColor = stringToColor(u);
    avatar.textContent = u[0].toUpperCase();

    userAvatars[u] = avatar;

    const name = document.createElement("div");
    name.textContent = u;

    div.appendChild(avatar);
    div.appendChild(name);
    userList.appendChild(div);
  });
});

// VOICE
let localStream;
let peers = {};
let isMuted = false;
let isDeaf = false;

// speaking detection
let audioContext, analyser, dataArray;

async function startVoice(){
  if(localStream) return;

  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  socket.emit("join-voice");

  audioContext = new AudioContext();
  const source = audioContext.createMediaStreamSource(localStream);
  analyser = audioContext.createAnalyser();
  analyser.fftSize = 256;

  source.connect(analyser);
  dataArray = new Uint8Array(analyser.frequencyBinCount);

  requestAnimationFrame(checkSpeaking);
}

function checkSpeaking(){
  analyser.getByteFrequencyData(dataArray);
  const volume = dataArray.reduce((a,b)=>a+b)/dataArray.length;

  socket.emit("speaking", volume > 15);

  requestAnimationFrame(checkSpeaking);
}

function toggleMute(){
  isMuted = !isMuted;
  if(localStream) localStream.getAudioTracks()[0].enabled = !isMuted;
}

function toggleDeafen(){
  isDeaf = !isDeaf;
  document.querySelectorAll("audio").forEach(a => a.muted = isDeaf);
}

function leaveVoice(){
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
    localStream = null;
  }

  for(let id in peers){
    peers[id].close();
    delete peers[id];
  }
}

// WebRTC
socket.on("user-joined", id => {
  peers[id] = createPeer(id, true);
});

socket.on("offer", async ({offer, from}) => {
  const pc = createPeer(from, false);
  peers[from] = pc;

  await pc.setRemoteDescription(offer);
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  socket.emit("answer", {answer, to:from});
});

socket.on("answer", async ({answer, from}) => {
  await peers[from].setRemoteDescription(answer);
});

socket.on("ice", ({candidate, from}) => {
  peers[from].addIceCandidate(candidate);
});

function createPeer(id, initiator){
  const pc = new RTCPeerConnection({
    iceServers:[{urls:"stun:stun.l.google.com:19302"}]
  });

  if(localStream){
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  }

  pc.ontrack = e => {
    const audio = document.createElement("audio");
    audio.srcObject = e.streams[0];
    audio.autoplay = true;
    document.body.appendChild(audio);
  };

  pc.onicecandidate = e => {
    if(e.candidate){
      socket.emit("ice", {candidate:e.candidate, to:id});
    }
  };

  if(initiator){
    pc.createOffer().then(o=>{
      pc.setLocalDescription(o);
      socket.emit("offer", {offer:o, to:id});
    });
  }

  return pc;
}

// speaking indicator (others)
socket.on("speaking", ({user, speaking}) => {
  if(userAvatars[user]){
    if(speaking) userAvatars[user].classList.add("speaking");
    else userAvatars[user].classList.remove("speaking");
  }
});
</script>

</body>
</html>
