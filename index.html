<!DOCTYPE html>
<html>
<head>
  <title>Chat</title>
  <style>
    body { margin:0; font-family:Arial; background:#2f3136; color:white; }
    #app { display:flex; height:100vh; }

    #chat { flex:1; display:flex; flex-direction:column; }
    #messages { flex:1; padding:10px; overflow:auto; }
    #input { display:flex; padding:10px; background:#40444b; }

    input { flex:1; padding:10px; border:none; border-radius:5px; }
    button { margin-left:5px; padding:10px; border:none; border-radius:5px; background:#7289da; color:white; }

    #users { width:200px; background:#202225; padding:10px; }

    .message { margin-bottom:8px; }
    .avatar { width:25px; height:25px; border-radius:50%; display:inline-flex; align-items:center; justify-content:center; margin-right:5px; }
    .speaking { box-shadow:0 0 10px #43b581; }
  </style>
</head>
<body>

<script>
const username = prompt("Name:");
const room = prompt("Room:");
</script>

<div id="app">
  <div id="chat">
    <div id="messages"></div>

    <div id="input">
      <input id="msg" placeholder="Message..." />
      <button onclick="sendMsg()">Send</button>
    </div>

    <div style="padding:10px;">
      <button onclick="startVoice()">Join Voice</button>
      <button onclick="leaveVoice()">Leave Voice</button>
    </div>
  </div>

  <div id="users">
    <h3>Users</h3>
    <div id="userList"></div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const socket = io();
const messages = document.getElementById("messages");
const userList = document.getElementById("userList");

function color(str){
  let hash = 0;
  for(let i=0;i<str.length;i++) hash = str.charCodeAt(i)+((hash<<5)-hash);
  let c = '#';
  for(let i=0;i<3;i++){
    const v = (hash>>(i*8))&255;
    c += ('00'+v.toString(16)).slice(-2);
  }
  return c;
}

socket.emit("join-room",{room,username});

// send message
function sendMsg(){
  const msg = document.getElementById("msg").value;
  if(!msg) return;
  socket.emit("chat", msg);
  document.getElementById("msg").value="";
}

// enter key
document.getElementById("msg").addEventListener("keydown",e=>{
  if(e.key==="Enter") sendMsg();
});

// history
socket.on("chat-history", history=>{
  history.forEach(addMsg);
});

// new message
socket.on("chat", addMsg);

function addMsg(data){
  const div=document.createElement("div");
  div.className="message";

  const av=document.createElement("span");
  av.className="avatar";
  av.style.background=color(data.user);
  av.textContent=data.user[0].toUpperCase();

  div.appendChild(av);
  div.innerHTML+=`<b>${data.user}</b>: ${data.text}`;

  messages.appendChild(div);
}

// users
let avatars={};
socket.on("users", users=>{
  userList.innerHTML="";
  avatars={};

  users.forEach(u=>{
    const d=document.createElement("div");

    const a=document.createElement("span");
    a.className="avatar";
    a.style.background=color(u);
    a.textContent=u[0].toUpperCase();

    avatars[u]=a;

    d.appendChild(a);
    d.innerHTML+=u;
    userList.appendChild(d);
  });
});

// voice (basic)
let localStream;
async function startVoice(){
  if(localStream) return;
  localStream = await navigator.mediaDevices.getUserMedia({audio:true});
  socket.emit("join-voice");
}

function leaveVoice(){
  if(localStream){
    localStream.getTracks().forEach(t=>t.stop());
    localStream=null;
  }
}
</script>

</body>
</html>
